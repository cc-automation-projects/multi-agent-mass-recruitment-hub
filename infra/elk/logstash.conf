input {
  beats {
    port => 5044
  }
  http {
    port => 8080
  }
}

filter {
  json {
    source => "message"
    target => "parsed"
  }
  if [parsed] {
    mutate {
      replace => { "message" => "%{[parsed]}" }
    }
  }
  date {
    match => [ "timestamp", "ISO8601" ]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "mass-recruit-hub-%{+YYYY.MM.dd}"
    user => "${ELASTIC_USER}"
    password => "${ELASTIC_PASSWORD}"
  }
  stdout { codec => rubydebug }
}
