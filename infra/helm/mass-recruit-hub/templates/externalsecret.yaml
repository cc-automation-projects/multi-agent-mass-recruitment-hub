{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "mass-recruit-hub.fullname" . }}-secrets
  labels:
    {{- include "mass-recruit-hub.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: yandex-lockbox
    kind: SecretStore
  target:
    name: {{ include "mass-recruit-hub.fullname" . }}-env
    creationPolicy: Owner
  data:
  - secretKey: LLM_API_KEY
    remoteRef:
      key: mass-recruit-hub/llm/api_key
  - secretKey: TELEGRAM_BOT_TOKEN
    remoteRef:
      key: mass-recruit-hub/telegram/token
  - secretKey: MAX_API_KEY
    remoteRef:
      key: mass-recruit-hub/max/api_key
  - secretKey: VK_API_TOKEN
    remoteRef:
      key: mass-recruit-hub/vk/token
  - secretKey: DB_PASSWORD
    remoteRef:
      key: mass-recruit-hub/db/password
  - secretKey: REDIS_PASSWORD
    remoteRef:
      key: mass-recruit-hub/redis/password
{{- end }}
