# =============================================================================
# MassRecruitHub — Helm Values
# All PII-related services MUST be deployed in Yandex Cloud (РФ-контур)
# =============================================================================

replicaCount: 2

image:
  repository: cr.yandex/crpXXXXX/mass-recruit-hub
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: yc-registry-secret

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000
  protocol: TCP
  name: http

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: api.massrecruithub.ru
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: mass-recruit-hub-tls
      hosts:
        - api.massrecruithub.ru

resources:
  limits:
    cpu: 2
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# =============================================================================
# External dependencies (managed separately in Yandex Cloud)
# =============================================================================
postgresql:
  host: "postgres-cluster-rw.mass-recruit-hub.svc.cluster.local"
  port: 5432
  database: massrecruithub
  user: massrecruithub
  existingSecret: mass-recruit-hub-pg

redis:
  host: "redis-cluster.mass-recruit-hub.svc.cluster.local"
  port: 6379
  existingSecret: mass-recruit-hub-redis

qdrant:
  host: "qdrant-cluster.mass-recruit-hub.svc.cluster.local"
  port: 6333

mlflow:
  trackingUri: "http://mlflow.mlflow.svc.cluster.local:5000"
  experimentName: mass-recruit-hub

# =============================================================================
# Application configuration
# =============================================================================
config:
  environment: production
  logLevel: INFO
  llmEndpoint: https://llm.api.yandex.cloud/v1
  llmModel: yandexgpt/latest
  auditLogRetentionDays: 1095
  consentRequired: true
  softDeleteAudit: true

externalSecrets:
  enabled: true

existingSecrets:
  llmApiKey: mass-recruit-hub-llm
  telemetryApiKey: mass-recruit-hub-telemetry
  messengerApiKeys: mass-recruit-hub-messengers
  mlflowApiKey: mass-recruit-hub-mlflow

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15

monitoring:
  enabled: true
  prometheus:
    serviceMonitor:
      enabled: true
  grafana:
    enabled: true
    dashboard:
      label: grafana_dashboard
      configMapName: mass-recruit-hub-grafana-dashboard

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
