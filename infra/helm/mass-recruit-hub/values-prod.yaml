# Production values for MassRecruitHub

replicaCount: 3

image:
  repository: cr.yandex/crpXXXXX/mass-recruit-hub
  tag: latest
  pullPolicy: Always

imagePullSecrets:
  - name: yc-registry-secret

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations:
    eks.amazonaws.com/role-arn: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000
  protocol: TCP
  name: http

ingress:
  enabled: true
  className: "nginx"
  annotations:
    ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "yc-cluster-issuer"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
  hosts:
    - host: api.massrecruithub.ru
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: mass-recruit-hub-tls
      hosts:
        - api.massrecruithub.ru

resources:
  limits:
    cpu: 2
    memory: 4Gi
  requests:
    cpu: 1
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector:
  node_group: app

tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - mass-recruit-hub
          topologyKey: kubernetes.io/hostname

postgresql:
  host: "c-xxxxx.mdb.yandexcloud.net"
  port: 6432
  database: massrecruithub
  user: massrecruithub
  existingSecret: mass-recruit-hub-pg

redis:
  host: "redis-cluster.mdb.yandexcloud.net"
  port: 6380
  existingSecret: mass-recruit-hub-redis

qdrant:
  host: "qdrant-cluster.mass-recruit-hub.svc.cluster.local"
  port: 6333

mlflow:
  trackingUri: "http://mlflow.mlflow.svc.cluster.local:5000"
  experimentName: mass-recruit-hub

config:
  environment: production
  logLevel: INFO
  llmEndpoint: https://llm.api.yandex.cloud/v1
  llmModel: yandexgpt/latest
  auditLogRetentionDays: 1095
  consentRequired: true
  softDeleteAudit: true

existingSecrets:
  llmApiKey: mass-recruit-hub-llm
  telemetryApiKey: mass-recruit-hub-telemetry
  messengerApiKeys: mass-recruit-hub-messengers
  mlflowApiKey: mass-recruit-hub-mlflow

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
